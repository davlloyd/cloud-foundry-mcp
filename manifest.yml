---
applications:
  - name: cloud-foundry-mcp-server
    buildpacks:
      - java_buildpack_offline
    memory: 1G
    instances: 1
    path: target/cloud-foundry-mcp-0.0.1-SNAPSHOT.jar
    services:
      - sso
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      CF_APIHOST: ((CF_APIHOST))
      # Static credentials are optional when OAuth2/SSO is configured.
      # Provide these only if you need a fallback service account.
      # CF_USERNAME: ((CF_USERNAME))
      # CF_PASSWORD: ((CF_PASSWORD))
      # CF_ORG: ((CF_ORG))
      # CF_SPACE: ((CF_SPACE))
