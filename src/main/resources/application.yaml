cf:
  apiHost: ${vcap.services.cf-client.credentials.apihost:${CF_APIHOST:}}
  username: ${vcap.services.cf-client.credentials.username:${CF_USERNAME:}}
  password: ${vcap.services.cf-client.credentials.password:${CF_PASSWORD:}}
  organization: ${vcap.services.cf-client.credentials.org:${CF_ORG:}}
  space: ${vcap.services.cf-client.credentials.space:${CF_SPACE:}}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # On CF, java-cfenv-boot-pivotal-sso auto-configures this from the SSO tile binding.
          # For local development, set the SSO_ISSUER_URI environment variable.
          issuer-uri: ${SSO_ISSUER_URI:}

# The SSO auth domain used as the authorization server in OAuth 2.0 Protected Resource Metadata.
# On CF, java-cfenv-boot-pivotal-sso sets ssoServiceUrl from the SSO tile's auth_domain.
# For local dev, set SSO_AUTH_DOMAIN (e.g., https://login.sys.mycf.com).
sso:
  auth-domain: ${ssoServiceUrl:${SSO_AUTH_DOMAIN:}}
